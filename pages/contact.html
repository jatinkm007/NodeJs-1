<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <nav>
    <div class="logo">MyWebsite</div>
    <ul>
      <li><a href="/home">Home</a></li>
      <li><a href="/about">About</a></li>
      <li><a href="/services">Services</a></li>
      <li><a href="/contact">Contact</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>Contact Us</h1>
    <p>Have a question or want to get in touch? Fill out the form below.</p>
  </div>

  
    <div class="contact-form">
      <h2>Send a Message</h2>
      <p class="section-subtitle" style="margin-bottom:25px;">We'll get back to you as soon as possible.</p>

      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Jatin Kumar" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="name@example.com" />
      </div>
      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" id="subject" placeholder="What's this about?" />
      </div>
      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" placeholder="Write your message here..."></textarea>
      </div>
      <button class="submit-btn">Send Message</button>
    </div>

  <footer>
    <p>&copy; 2026 MyWebsite. All rights reserved.</p>
  </footer>

</body>
</html>
